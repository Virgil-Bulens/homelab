---
name: SSO Provision

on:
  push:
    branches: [main]
    paths:
      - infrastructure/authentik/apps.yaml
      - scripts/provision-sso.py
  workflow_dispatch:

jobs:
  provision:
    name: Provision SSO credentials
    runs-on: ubuntu-latest

    permissions:
      contents: write  # needed to push generated SealedSecrets back to the repo

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Use a PAT so the push-back commit triggers downstream workflows.
          # GITHUB_TOKEN pushes are ignored by Actions to prevent loops.
          token: ${{ secrets.GH_PAT }}

      - name: Install kubeseal
        run: |
          KUBESEAL_VERSION=0.27.3
          curl -sSL \
            "https://github.com/bitnami-labs/sealed-secrets/releases/download/v${KUBESEAL_VERSION}/kubeseal-${KUBESEAL_VERSION}-linux-amd64.tar.gz" \
            | tar -xz kubeseal
          sudo mv kubeseal /usr/local/bin/

      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_OAUTH_SECRET }}
          tags: tag:ci
          version: "1.94.2"

      - name: Setup kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_BASE64 }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Install Python deps
        run: pip install pyyaml

      - name: Run provision script
        id: provision
        env:
          SEALED_SECRETS_CERT: ${{ secrets.SEALED_SECRETS_CERT }}
        # Exit 2 = new credentials provisioned; exit 0 = nothing new.
        # `|| [[ $? -eq 2 ]]` prevents the step from failing on exit 2.
        run: |
          python3 scripts/provision-sso.py && echo "new_credentials=false" >> "$GITHUB_OUTPUT" \
            || { [[ $? -eq 2 ]] && echo "new_credentials=true" >> "$GITHUB_OUTPUT"; }

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet && echo "No changes to commit." && exit 0
          git commit -m "chore: provision SSO credentials [skip ci]"
          git push

      - name: Wait for ArgoCD to unseal new secrets
        if: steps.provision.outputs.new_credentials == 'true'
        run: |
          # Authentik must not restart until the Sealed Secrets controller has unsealed
          # the new *-oidc-env secrets. Strategy: record the current Secret resourceVersions,
          # trigger an ArgoCD hard refresh, then poll until all versions have advanced.
          echo "Recording current secret resourceVersions..."
          declare -A OLD_VERSIONS
          for app in $(python3 -c "
          import yaml
          with open('infrastructure/authentik/apps.yaml') as f:
              apps = yaml.safe_load(f)['apps']
          for a in apps: print(a['name'])
          "); do
            SECRET="${app}-oidc-env"
            VER=$(kubectl get secret -n authentik "$SECRET" -o jsonpath='{.metadata.resourceVersion}' 2>/dev/null || echo "0")
            OLD_VERSIONS[$SECRET]=$VER
            echo "  $SECRET: resourceVersion=$VER"
          done

          echo "Triggering ArgoCD hard refresh for authentik..."
          kubectl annotate application -n argocd authentik argocd.argoproj.io/refresh=hard --overwrite

          echo "Polling for updated secrets (max 5 min)..."
          for app in "${!OLD_VERSIONS[@]}"; do
            OLD=${OLD_VERSIONS[$app]}
            echo "  Waiting for $app to advance past resourceVersion=$OLD..."
            for i in $(seq 1 30); do
              NEW=$(kubectl get secret -n authentik "$app" -o jsonpath='{.metadata.resourceVersion}' 2>/dev/null || echo "0")
              if [[ "$NEW" != "$OLD" && "$NEW" != "0" ]]; then
                echo "  $app updated: resourceVersion=$NEW"
                break
              fi
              echo "    attempt $i: still at $NEW, retrying in 10s..."
              sleep 10
            done
          done

      - name: Restart Authentik to pick up new credentials
        if: steps.provision.outputs.new_credentials == 'true'
        run: |
          kubectl rollout restart deployment/authentik-server deployment/authentik-worker -n authentik
          kubectl rollout status deployment/authentik-server -n authentik --timeout=120s
          kubectl rollout status deployment/authentik-worker -n authentik --timeout=120s
