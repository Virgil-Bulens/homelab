name: Generate diagrams

on:
  push:
    branches:
      - main
    paths:
      - infrastructure/proxmox/**.tf
  workflow_dispatch:

jobs:
  terraform-graph:
    name: Terraform architecture diagram
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.6"
          terraform_wrapper: false

      - name: Install Graphviz
        run: sudo apt-get install -y graphviz

      - name: Cache Terraform providers
        uses: actions/cache@v4
        with:
          path: ~/.terraform.d/plugin-cache
          key: terraform-providers-${{ hashFiles('infrastructure/proxmox/.terraform.lock.hcl') }}

      - name: Terraform init
        working-directory: infrastructure/proxmox
        env:
          TF_PLUGIN_CACHE_DIR: ~/.terraform.d/plugin-cache
        run: terraform init -backend=false

      - name: Generate diagram
        working-directory: infrastructure/proxmox
        run: terraform graph | dot -Tpng -o ../../docs/infrastructure.png

      - name: Commit updated diagram
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: regenerate infrastructure diagram [skip ci]"
          file_pattern: "docs/infrastructure.png"
