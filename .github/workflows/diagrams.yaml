name: Generate diagrams

on:
  push:
    branches:
      - main
    paths:
      - infrastructure/proxmox/**.tf
  workflow_dispatch:

jobs:
  generate:
    name: Terraform architecture diagram
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Install python-hcl2
        run: pip install python-hcl2

      - name: Generate Mermaid diagram
        run: python scripts/generate-diagram.py infrastructure/proxmox docs/infrastructure.md

      - name: Commit updated diagram
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: regenerate infrastructure diagram [skip ci]"
          file_pattern: "docs/infrastructure.md"
