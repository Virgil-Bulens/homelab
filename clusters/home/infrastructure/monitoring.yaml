---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Virgil-Bulens/homelab
    targetRevision: HEAD
    path: infrastructure/monitoring
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  # Cilium (Gateway controller) writes back status.parents on HTTPRoutes after admission.
  # With ServerSideApply, ignore by managedFieldsManagers rather than jsonPointers —
  # that's the SSA-aware mechanism ArgoCD uses to skip fields owned by another manager.
  ignoreDifferences:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      managedFieldsManagers:
        - cilium-operator-generic
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
      - RespectIgnoreDifferences=true
