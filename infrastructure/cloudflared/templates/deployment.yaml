---
apiVersion: v1
kind: Namespace
metadata:
  name: cloudflared
---
# cloudflared runs as a Deployment (multiple replicas for HA).
# It authenticates via TUNNEL_TOKEN from the SealedSecret and routes traffic
# to the cluster Gateway based on the ingress rules defined in Terraform.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared
  namespace: cloudflared
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cloudflared
  template:
    metadata:
      labels:
        app: cloudflared
    spec:
      containers:
        - name: cloudflared
          image: cloudflare/cloudflared:2026.3.0
          args:
            - tunnel
            - --no-autoupdate
            - run
          env:
            - name: TUNNEL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: cloudflared-token
                  key: token
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 128Mi
