---
cert-manager:
  crds:
    enabled: true
  # Required for cert-manager to watch Gateway/HTTPRoute objects and auto-issue certs
  featureGates: "ExperimentalGatewayAPISupport=true"
  # Use Cloudflare's authoritative nameservers for DNS01 propagation checks.
  # These have the TXT record the instant the API writes it — no propagation delay.
  # Hostnames are stable (Cloudflare NS for virg.be); IPs would change with anycast.
  extraArgs:
    - --dns01-recursive-nameservers=bill.ns.cloudflare.com:53,mia.ns.cloudflare.com:53
    - --dns01-recursive-nameservers-only=true
