---
version: 1
metadata:
  name: "oauth2-apps"
entries:

  # ArgoCD OAuth2 Provider
  - model: authentik_providers_oauth2.oauth2provider
    state: present
    id: argocd-oauth2
    identifiers:
      name: argocd
    attrs:
      name: argocd
      authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      client_id: !Env ARGOCD_CLIENT_ID
      client_secret: !Env ARGOCD_CLIENT_SECRET
      redirect_uris:
        - matching_mode: strict
          url: "https://argocd.virg.be/auth/callback"
      client_type: confidential

  # ArgoCD Application
  - model: authentik_core.application
    state: present
    identifiers:
      slug: argocd
    attrs:
      name: ArgoCD
      slug: argocd
      provider: !KeyOf argocd-oauth2
      meta_launch_url: "https://argocd.virg.be"
      backchannel_providers: []

  # Grafana OAuth2 Provider
  - model: authentik_providers_oauth2.oauth2provider
    state: present
    id: grafana-oauth2
    identifiers:
      name: grafana
