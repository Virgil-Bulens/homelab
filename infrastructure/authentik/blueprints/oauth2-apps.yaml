# Generated by scripts/provision-sso.py — do not edit manually.
# Source of truth: infrastructure/authentik/apps.yaml
---
version: 1
metadata:
  name: "oauth2-apps"
entries:

  # Groups scope mapping — shared across all apps
  - model: authentik_providers_oauth2.scopemapping
    state: present
    id: groups-scope
    identifiers:
      name: homelab groups
      scope_name: groups
    attrs:
      name: homelab groups
      scope_name: groups
      description: Group membership
      expression: |
        return [g.name for g in request.user.ak_groups.all()]

  # ArgoCD OAuth2 Provider
  - model: authentik_providers_oauth2.oauth2provider
    state: present
    id: argocd-oauth2
    identifiers:
      name: argocd
    attrs:
      name: argocd
      authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      client_id: !Env ARGOCD_CLIENT_ID
      client_secret: !Env ARGOCD_CLIENT_SECRET
      signing_key: !Find [authentik_crypto.certificatekeypair, [name, authentik Internal JWT Certificate]]
      property_mappings:
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, openid]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, email]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, profile]]
        - !KeyOf groups-scope
      access_code_validity: minutes=5
      access_token_validity: hours=24
      refresh_token_validity: days=7
      redirect_uris:
        - matching_mode: strict
          url: "https://argocd.virg.be/auth/callback"
      client_type: confidential

  # ArgoCD Application
  - model: authentik_core.application
    state: present
    id: argocd-app
    identifiers:
      slug: argocd
    attrs:
      name: ArgoCD
      slug: argocd
      provider: !KeyOf argocd-oauth2
      meta_launch_url: "https://argocd.virg.be"
      backchannel_providers: []

  # ArgoCD Group
  - model: authentik_core.group
    state: present
    id: argocd-group
    identifiers:
      name: app:argocd
    attrs:
      name: app:argocd
      users:
        - !Find [authentik_core.user, [email, !Env AUTHENTIK_ADMIN_EMAIL]]

  # ArgoCD Policy Binding — requires group membership
  - model: authentik_policies_expression.expressionpolicy
    state: present
    id: argocd-group-policy
    identifiers:
      name: argocd-group-access
    attrs:
      name: argocd-group-access
      expression: "return ak_is_group_member(request.user, name=\"app:argocd\")"

  - model: authentik_policies.policybinding
    state: present
    id: argocd-app-binding
    identifiers:
      order: 0
      target: !KeyOf argocd-app
      policy: !KeyOf argocd-group-policy
    attrs:
      target: !KeyOf argocd-app
      policy: !KeyOf argocd-group-policy
      order: 0

  # Grafana OAuth2 Provider
  - model: authentik_providers_oauth2.oauth2provider
    state: present
    id: grafana-oauth2
    identifiers:
      name: grafana
    attrs:
      name: grafana
      authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      client_id: !Env GRAFANA_CLIENT_ID
      client_secret: !Env GRAFANA_CLIENT_SECRET
      signing_key: !Find [authentik_crypto.certificatekeypair, [name, authentik Internal JWT Certificate]]
      property_mappings:
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, openid]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, email]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, profile]]
        - !KeyOf groups-scope
      access_code_validity: minutes=5
      access_token_validity: hours=24
      refresh_token_validity: days=7
      redirect_uris:
        - matching_mode: strict
          url: "https://grafana.virg.be/login/generic_oauth"
      client_type: confidential

  # Grafana Application
  - model: authentik_core.application
    state: present
    id: grafana-app
    identifiers:
      slug: grafana
    attrs:
      name: Grafana
      slug: grafana
      provider: !KeyOf grafana-oauth2
      meta_launch_url: "https://grafana.virg.be"
      backchannel_providers: []

  # Grafana Group
  - model: authentik_core.group
    state: present
    id: grafana-group
    identifiers:
      name: app:grafana
    attrs:
      name: app:grafana
      users:
        - !Find [authentik_core.user, [email, !Env AUTHENTIK_ADMIN_EMAIL]]

  # Grafana Policy Binding — requires group membership
  - model: authentik_policies_expression.expressionpolicy
    state: present
    id: grafana-group-policy
    identifiers:
      name: grafana-group-access
    attrs:
      name: grafana-group-access
      expression: "return ak_is_group_member(request.user, name=\"app:grafana\")"

  - model: authentik_policies.policybinding
    state: present
    id: grafana-app-binding
    identifiers:
      order: 0
      target: !KeyOf grafana-app
      policy: !KeyOf grafana-group-policy
    attrs:
      target: !KeyOf grafana-app
      policy: !KeyOf grafana-group-policy
      order: 0
