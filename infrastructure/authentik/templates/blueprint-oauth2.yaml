---
apiVersion: v1
kind: ConfigMap
metadata:
  name: authentik-blueprints
  namespace: authentik
data:
  oauth2-apps.yaml: |
    version: 1
    metadata:
      name: oauth2-apps
    entries:
      # ArgoCD OAuth2 Provider
      - model: authentik_providers_oauth2.oauth2provider
        identifiers:
          name: argocd
        attrs:
          name: argocd
          client_type: confidential
          rsa_key: !Find [authentik_crypto.rsakey, [name, authentik default]]
          redirect_uris: "https://argocd.virg.be/auth/callback"
      
      # ArgoCD Application
      - model: authentik_core.application
        identifiers:
          slug: argocd
        attrs:
          name: ArgoCD
          slug: argocd
          provider: !Find [authentik_providers_oauth2.oauth2provider, [name, argocd]]
          icon: https://argocd-image-updater.readthedocs.io/_static/argocd.png
      
      # Grafana OAuth2 Provider
      - model: authentik_providers_oauth2.oauth2provider
        identifiers:
          name: grafana
        attrs:
          name: grafana
          client_type: confidential
          rsa_key: !Find [authentik_crypto.rsakey, [name, authentik default]]
          redirect_uris: "https://grafana.virg.be/login/generic_oauth"
      
      # Grafana Application
      - model: authentik_core.application
        identifiers:
          slug: grafana
        attrs:
          name: Grafana
          slug: grafana
          provider: !Find [authentik_providers_oauth2.oauth2provider, [name, grafana]]
          icon: https://grafana.com/images/grafana_icon.svg
