---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: authentik
  namespace: authentik
spec:
  hostnames:
    - authentik.virg.be
  parentRefs:
    - name: homelab
      namespace: networking
      sectionName: https
  rules:
    - backendRefs:
        - name: authentik-server
          port: 80
