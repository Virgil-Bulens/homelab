---
# Declarative SSO provisioning for Authentik.
# Adding an entry here triggers the sso-provision CI workflow, which:
#   - Generates OIDC client_id + client_secret
#   - Creates SealedSecrets in the app namespace and the authentik namespace
#   - Regenerates the Authentik blueprint ConfigMap
#   - Updates the Authentik Helm envFrom values
#   - Generates infrastructure/<chart_path>/oidc-values.yaml (Helm OIDC overlay)
#   - Patches clusters/home/infrastructure/<chart_path>.yaml to include oidc-values.yaml
#
# To rotate credentials: delete the two *-oidc*-sealed.yaml files and push.
# See: brain/Procedures/Enable SSO for an App.md

apps:
  - name: argocd
    namespace: argocd
    display_name: ArgoCD
    group: "app:argocd"
    redirect_uris:
      - "https://argocd.virg.be/auth/callback"
    post_logout_redirect_uri: "https://argocd.virg.be/login"
    launch_url: "https://argocd.virg.be"
    scim: null
    # ArgoCD config secret references require this label to be visible to the API server
    secret_labels:
      app.kubernetes.io/part-of: argocd
    oidc_helm_patch:
      argo-cd:
        configs:
          cm:
            url: "https://argocd.virg.be"
            oidc.config: |
              name: Authentik
              issuer: https://authentik.virg.be/application/o/argocd/
              clientID: $argocd-oidc:client_id
              clientSecret: $argocd-oidc:client_secret
              requestedScopes:
                - openid
                - profile
                - email
                - groups
              groupClaim: groups
              logoutURL: https://authentik.virg.be/application/o/argocd/end-session/
          rbac:
            policy.csv: |
              g, app:argocd, role:admin

  - name: grafana
    namespace: monitoring
    chart_path: monitoring  # infrastructure/<chart_path>/templates/<name>-oidc-sealed.yaml
    display_name: Grafana
    group: "app:grafana"
    redirect_uris:
      - "https://grafana.virg.be/login/generic_oauth"
    launch_url: "https://grafana.virg.be"
    scim: null
    oidc_helm_patch:
      kube-prometheus-stack:
        grafana:
          envFromSecret: "grafana-oidc"
          grafana.ini:
            server:
              root_url: "https://grafana.virg.be"
            auth.generic_oauth:
              enabled: true
              name: Authentik
              allow_sign_up: true
              client_id: "$__env{client_id}"
              client_secret: "$__env{client_secret}"
              scopes: openid profile email
              auth_url: https://authentik.virg.be/application/o/authorize/
              token_url: https://authentik.virg.be/application/o/token/
              email_attribute_path: email
              login_attribute_path: preferred_username
              name_attribute_path: name
              use_pkce: true
              use_id_token: true
              role_attribute_path: "contains(groups[*], 'app:grafana') && 'Admin' || 'Viewer'"
