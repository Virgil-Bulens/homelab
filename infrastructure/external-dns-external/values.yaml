external-dns:
  # Only manage records for virg.be
  domainFilters:
    - virg.be

  # Watch HTTPRoutes — creates per-app CNAMEs in Cloudflare for each HTTPRoute hostname
  sources:
    - gateway-httproute

  # Identifies records owned by this instance; must differ from internal instance
  txtOwnerId: homelab-external

  # Only create/update — never delete records
  policy: upsert-only

  provider:
    name: cloudflare

  env:
    - name: CF_API_TOKEN
      valueFrom:
        secretKeyRef:
          name: external-dns-cloudflare
          key: api-token

  extraArgs:
    # Proxy records through Cloudflare (orange cloud) — required for tunnel routing
    - --cloudflare-proxied
    # Point all created records at the tunnel CNAME
    - --default-targets=80cf466e-1ffb-48c3-9953-718e7e9cf718.cfargotunnel.com
    # Opt-in: only create records for HTTPRoutes with this annotation.
    # To make an app public, add: external-dns.alpha.kubernetes.io/public: "true"
    - --annotation-filter=external-dns.alpha.kubernetes.io/public=true
