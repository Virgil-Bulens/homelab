longhorn:
  # Pre-upgrade job requires longhorn-service-account to already exist — fails on fresh install.
  # Only meaningful when upgrading from a prior Longhorn version; skip on first deploy.
  preUpgradeChecker:
    jobEnabled: false

  defaultSettings:
    # 2 replicas matches the worker count — can survive losing one worker
    defaultReplicaCount: 2
    # Refuse to schedule new volumes when less than 10% disk space remains
    storageMinimalAvailablePercentage: 10

  persistence:
    # Not the default StorageClass — local-path remains default for system workloads.
    # Stateful apps (Prometheus, Loki, Grafana, databases) must explicitly set
    # storageClassName: longhorn in their PVCs / Helm values.
    defaultClass: false
    defaultClassReplicaCount: 2
