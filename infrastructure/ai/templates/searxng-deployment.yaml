apiVersion: apps/v1
kind: Deployment
metadata:
  name: searxng
  namespace: ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: searxng
  template:
    metadata:
      labels:
        app: searxng
    spec:
      # No toleration for ai=true:NoSchedule — schedules on regular workers only.
      # SearXNG is stateless and does not belong on the memory-reserved AI node.
      containers:
        - name: searxng
          image: {{ .Values.searxng.image }}
          ports:
            - containerPort: 8080
          env:
            - name: SEARXNG_SECRET
              valueFrom:
                secretKeyRef:
                  name: searxng-secret
                  key: SEARXNG_SECRET
            # Override Kubernetes service-discovery env var (SEARXNG_PORT=tcp://...)
            # which SearXNG's entrypoint passes verbatim to granian --port.
            - name: SEARXNG_PORT
              value: "8080"
          volumeMounts:
            # Mount to /etc/searxng/settings.yml.bak and point SEARXNG_SETTINGS_PATH
            # to avoid chown failure on the read-only ConfigMap-mounted file.
            # Instead, mount the config into an init-writable location via emptyDir.
            - name: config-rw
              mountPath: /etc/searxng
      initContainers:
        - name: copy-config
          image: busybox
          command: ["sh", "-c", "cp /config-ro/settings.yml /etc/searxng/settings.yml && chown 977:977 /etc/searxng/settings.yml"]
          volumeMounts:
            - name: config-ro
              mountPath: /config-ro
            - name: config-rw
              mountPath: /etc/searxng
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
      volumes:
        - name: config-ro
          configMap:
            name: searxng-config
        - name: config-rw
          emptyDir: {}
