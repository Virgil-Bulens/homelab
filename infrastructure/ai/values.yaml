llama:
  image: ghcr.io/ggml-org/llama.cpp:server  # project moved to ggml-org org
  # Gemma 3 4B — no Sliding Window Attention, efficient CPU inference (~10 tok/s on i7-1165G7)
  # Gemma 4 E4B dropped: SWA checkpoint thrash made it 0.1 tok/s on CPU
  model:
    filename: gemma-3-4b-it-UD-Q4_K_XL.gguf
    url: https://huggingface.co/unsloth/gemma-3-4b-it-GGUF/resolve/main/gemma-3-4b-it-UD-Q4_K_XL.gguf
  # Match physical core count of i7-1165G7; HT does not improve compute-bound inference
  threads: 4
  ctxSize: 8192
  storage: 30Gi
  storageClass: local-path  # model lives directly on the ai node — no cross-attach needed
  # Pin to the tainted AI worker node
  nodeName: k3s-ai-worker-1

searxng:
  image: searxng/searxng:latest

openwebui:
  image: ghcr.io/open-webui/open-webui:v0.8.12
  storage: 2Gi
  hostname: chat.virg.be
  authentikIssuer: https://authentik.virg.be/application/o/open-webui/
