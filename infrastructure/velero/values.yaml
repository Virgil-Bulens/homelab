velero:
  # CSI Data Movement via Kopia — no file system backup, no native cloud snapshots.
  uploaderType: kopia
  snapshotsEnabled: false
  defaultVolumesToFsBackup: false

  # bitnami/kubectl versioned tags don't exist on Docker Hub; ArgoCD ServerSideApply handles CRD updates.
  upgradeCRDs: false

  # Node agent required for Longhorn block volume access (mounts snapshot clone PVCs).
  deployNodeAgent: true
  nodeAgent:
    privileged: true

  # AWS plugin required for S3-compatible BSL (Cloudflare R2 uses S3 API).
  initContainers:
    - name: velero-plugin-for-aws
      image: velero/velero-plugin-for-aws:v1.12.0
      imagePullPolicy: IfNotPresent
      volumeMounts:
        - mountPath: /target
          name: plugins

  credentials:
    useSecret: true
    existingSecret: velero-r2-credentials

  # EnableCSI is required for the csi-pvc-backupper plugin to take VolumeSnapshots.
  # Without it, Velero skips CSI snapshot actions and backs up only metadata.
  features: EnableCSI

  configuration:
    backupStorageLocation:
      - name: default
        provider: aws
        bucket: homelab-velero-backups
        default: true
        config:
          region: auto
          # Substitute CLOUDFLARE_ACCOUNT_ID after terraform apply (see infrastructure/cloudflare-r2/outputs.tf)
          s3Url: https://c3aead5e648abe8b77607055ef68508d.r2.cloudflarestorage.com
          s3ForcePathStyle: "true"

  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
      namespace: velero

  # Grafana dashboard ID 16829 — provisioned via ConfigMap sidecar (same pattern as monitoring stack)
  # Add dashboard JSON to templates/dashboards.yaml after confirming Grafana sidecar label selector.
