---
# Redirect plain HTTP to HTTPS.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd-http-redirect
  namespace: argocd
spec:
  parentRefs:
    - name: homelab
      namespace: networking
      sectionName: http
  hostnames:
    - argocd.virg.be
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
---
# HTTPS route — TLS terminated at the Gateway, plain HTTP to argocd-server.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd
  namespace: argocd
spec:
  parentRefs:
    - name: homelab
      namespace: networking
      sectionName: https
  hostnames:
    - argocd.virg.be
  rules:
    - backendRefs:
        - name: argocd-server
          port: 80
