---
# Reference values for the bootstrapped Cilium Helm release.
# Cilium is NOT managed by ArgoCD (it must exist before ArgoCD can run).
#
# To apply changes, first ensure Gateway API CRDs are installed:
#   kubectl apply -f https://github.com/kubernetes-sigs/gateway-api/releases/download/v1.3.0/experimental-install.yaml
#
# Then upgrade Cilium:
#   helm upgrade cilium cilium/cilium --version 1.19.2 -n kube-system -f infrastructure/cilium/values.yaml --force-conflicts
#   kubectl -n kube-system rollout restart deployment/cilium-operator && kubectl -n kube-system rollout restart ds/cilium
encryption:
  enabled: true
  type: wireguard
  # Encrypts pod-to-pod traffic across nodes. Node-to-node only — same-node traffic
  # stays in-kernel and doesn't traverse the wire so WireGuard doesn't apply there.
  nodeEncryption: false
authentication:
  enabled: true
  mutual:
    spire:
      # Cilium manages the SPIRE install. Trust domain matches the cluster name.
      enabled: true
      install:
        enabled: true
        # PVC-backed storage — survives SPIRE server restarts.
        # Uses local-path provisioner (k3s default). Loss of the PVC means
        # all agents must re-attest and all entries must be re-registered.
        server:
          dataStorage:
            enabled: true
            storageClass: local-path
cluster:
  name: homelab
gatewayAPI:
  enabled: true
ipam:
  mode: kubernetes
k8sServiceHost: 192.168.2.10
k8sServicePort: 6443
kubeProxyReplacement: true
# Required in native routing mode — without it the BPF veth hook classifies
# host-originated traffic (kubelet probes) as identity=world, causing probe drops.
hostFirewall:
  enabled: true
operator:
  replicas: 1
# Native routing: all nodes are on the same L2 subnet (192.168.2.x).
# Direct routing avoids double-encapsulation (VXLAN + WireGuard) that causes MTU issues.
routingMode: native
autoDirectNodeRoutes: true
ipv4NativeRoutingCIDR: "10.42.0.0/16"
