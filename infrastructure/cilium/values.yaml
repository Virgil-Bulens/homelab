---
# Reference values for the bootstrapped Cilium Helm release.
# Cilium is NOT managed by ArgoCD (it must exist before ArgoCD can run).
#
# To apply changes, first ensure Gateway API CRDs are installed:
#   kubectl apply -f https://github.com/kubernetes-sigs/gateway-api/releases/download/v1.2.1/standard-install.yaml
#
# Then upgrade Cilium:
#   helm upgrade cilium cilium/cilium -n kube-system -f infrastructure/cilium/values.yaml
cluster:
  name: homelab
gatewayAPI:
  enabled: true
ipam:
  mode: kubernetes
k8sServiceHost: 192.168.2.10
k8sServicePort: 6443
kubeProxyReplacement: true
operator:
  replicas: 1
routingMode: tunnel
tunnelProtocol: vxlan
