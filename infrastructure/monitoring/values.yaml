---
kube-prometheus-stack:
  # Grafana — credentials from SealedSecret; no persistence (dashboards managed as code via sidecar)
  grafana:
    admin:
      existingSecret: grafana-admin
      userKey: admin-user
      passwordKey: admin-password
    persistence:
      enabled: false
    # Grafana is served via the Gateway HTTPRoute — disable the built-in ingress
    ingress:
      enabled: false
    # Default dashboard sidecar — auto-loads ConfigMap-based dashboards
    sidecar:
      dashboards:
        enabled: true
    grafana.ini:
      dashboards:
        default_home_dashboard_path: /tmp/dashboards/k8s-resources-cluster.json

  # Prometheus — persistent storage on Longhorn
  prometheus:
    prometheusSpec:
      retention: 15d
      storageSpec:
        volumeClaimTemplate:
          spec:
            storageClassName: longhorn
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 20Gi

  # Alertmanager — no persistence (silences and dedup state are ephemeral; acceptable for homelab)
  alertmanager:
    alertmanagerSpec: {}
    config:
      # k3s embeds the scheduler and controller-manager in its own binary and
      # uses Cilium in kube-proxy replacement mode, so these three components
      # never expose the metrics endpoints kube-prometheus-stack expects.
      # Route them to null so they don't drown out real alerts.
      route:
        receiver: "null"
        group_by: ["namespace"]
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 12h
        routes:
          - receiver: "null"
            matchers:
              - alertname =~ "InfoInhibitor|Watchdog"
          - receiver: "null"
            matchers:
              - alertname =~ "KubeSchedulerDown|KubeControllerManagerDown|KubeProxyDown"
      receivers:
        - name: "null"
      inhibit_rules:
        - source_matchers:
            - severity = critical
          target_matchers:
            - severity =~ warning|info
          equal: [namespace, alertname]
        - source_matchers:
            - severity = warning
          target_matchers:
            - severity = info
          equal: [namespace, alertname]
        - source_matchers:
            - alertname = InfoInhibitor
          target_matchers:
            - severity = info
          equal: [namespace]

loki:
  # Single binary mode — appropriate for homelab scale
  deploymentMode: SingleBinary
  loki:
    commonConfig:
      replication_factor: 1
    storage:
      type: filesystem
    auth_enabled: false
    schemaConfig:
      configs:
        - from: "2024-01-01"
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: loki_index_
            period: 24h
  singleBinary:
    replicas: 1
    persistence:
      enabled: true
      storageClass: longhorn
      size: 10Gi
  # Disable microservice components (not used in single binary mode)
  read:
    replicas: 0
  write:
    replicas: 0
  backend:
    replicas: 0
  # Disable memcached caches — not needed at homelab scale, avoids scheduling pressure
  chunksCache:
    enabled: false
  resultsCache:
    enabled: false
  # Disable Loki's bundled Grafana — we use the one from kube-prometheus-stack
  grafana:
    enabled: false

promtail:
  config:
    clients:
      # Release name is "monitoring", Loki service is "monitoring-loki"
      - url: http://monitoring-loki:3100/loki/api/v1/push
