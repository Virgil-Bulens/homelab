---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pve-exporter
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pve-exporter
  template:
    metadata:
      labels:
        app: pve-exporter
    spec:
      containers:
        - name: pve-exporter
          image: prompve/prometheus-pve-exporter:3.8.2
          args: ["--config.file", "/etc/pve/pve.yml"]
          ports:
            - name: metrics
              containerPort: 9221
          volumeMounts:
            - name: config
              mountPath: /etc/pve
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi
      volumes:
        - name: config
          secret:
            secretName: pve-exporter-secret
---
apiVersion: v1
kind: Service
metadata:
  name: pve-exporter
  namespace: monitoring
  labels:
    app: pve-exporter
spec:
  selector:
    app: pve-exporter
  ports:
    - name: metrics
      port: 9221
      targetPort: metrics
---
# pve-exporter is a proxy exporter — Prometheus passes ?target=<proxmox-ip> as a query param.
# The relabeling sets instance to the target IP so dashboards label correctly.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: pve-exporter
  namespace: monitoring
  labels:
    release: monitoring
spec:
  selector:
    matchLabels:
      app: pve-exporter
  endpoints:
    - port: metrics
      path: /pve
      params:
        target: ["192.168.2.9"]
        module: ["default"]
      relabelings:
        - action: replace
          sourceLabels: [__param_target]
          targetLabel: instance
