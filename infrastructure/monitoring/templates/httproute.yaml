---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana-http-redirect
  namespace: monitoring
spec:
  parentRefs:
    - name: homelab
      namespace: networking
      sectionName: http
  hostnames:
    - grafana.virg.be
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
---
# HTTPS route — TLS terminated at the Gateway, plain HTTP to Grafana.
# Service name: monitoring-grafana (kube-prometheus-stack uses .Release.Name as prefix).
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana
  namespace: monitoring
spec:
  parentRefs:
    - name: homelab
      namespace: networking
      sectionName: https
  hostnames:
    - grafana.virg.be
  rules:
    - backendRefs:
        - name: monitoring-grafana
          port: 80
