---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: unifi-poller
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: unifi-poller
  template:
    metadata:
      labels:
        app: unifi-poller
    spec:
      containers:
        - name: unifi-poller
          image: ghcr.io/unpoller/unpoller:v2.39.0
          ports:
            - name: metrics
              containerPort: 9130
          volumeMounts:
            - name: config
              mountPath: /etc/unpoller
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi
      volumes:
        - name: config
          secret:
            secretName: unifi-poller-secret
---
apiVersion: v1
kind: Service
metadata:
  name: unifi-poller
  namespace: monitoring
  labels:
    app: unifi-poller
spec:
  selector:
    app: unifi-poller
  ports:
    - name: metrics
      port: 9130
      targetPort: metrics
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: unifi-poller
  namespace: monitoring
  labels:
    release: monitoring
spec:
  selector:
    matchLabels:
      app: unifi-poller
  endpoints:
    - port: metrics
      interval: 30s
