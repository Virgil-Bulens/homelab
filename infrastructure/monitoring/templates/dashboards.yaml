---
# Dashboard JSONs live in files/ (not templates/) so Helm doesn't process their
# {{...}} Grafana template variables as Go template directives.
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-pve
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: "Infrastructure"
    # Source: https://grafana.com/grafana/dashboards/10347
data:
  pve.json: |
    {{- .Files.Get "files/dashboard-pve.json" | nindent 4 }}
