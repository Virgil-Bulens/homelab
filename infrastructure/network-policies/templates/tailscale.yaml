---
# Tailscale operator: manages Connector CRDs via API server (baseline).
apiVersion: "cilium.io/v2"
kind: CiliumNetworkPolicy
metadata:
  name: tailscale-operator
  namespace: tailscale
spec:
  endpointSelector:
    matchLabels:
      app: operator
  egress:
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
---
# Tailscale subnet router: connects to Tailscale coordination server and
# routes traffic to/from the Tailscale network into the cluster.
# Needs broad egress: Tailscale uses DERP relays on 443/3478 + direct WireGuard on 41641.
apiVersion: "cilium.io/v2"
kind: CiliumNetworkPolicy
metadata:
  name: tailscale-subnet-router
  namespace: tailscale
spec:
  endpointSelector:
    matchLabels:
      tailscale.com/managed: "true"
  ingress:
    # Accept traffic routed in from the Tailscale network
    - fromEntities:
        - world
  egress:
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
            - port: "3478"
              protocol: UDP
            - port: "41641"
              protocol: UDP
