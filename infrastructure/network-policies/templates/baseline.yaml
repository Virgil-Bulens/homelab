---
# Allow kubelet health probes from the node host to all pods.
# Kubelet liveness/readiness probes originate from the node's host network.
# In native routing mode, the source IP is the cilium_host interface IP (in 10.42.0.0/16).
# Despite ipcache mapping this to identity=1 (host), the eBPF veth ingress hook
# classifies it as srcLabel=2 (reserved:world) before the ipcache lookup completes.
# fromEntities host/remote-node alone is insufficient — add CIDR rules to cover both
# the pod CIDR (cilium_host IPs) and the node physical subnet.
apiVersion: "cilium.io/v2"
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: allow-kubelet-probes
spec:
  endpointSelector: {}
  ingress:
    - fromEntities:
        - host
        - remote-node
    - fromCIDR:
        - 10.42.0.0/16
        - 192.168.2.0/24
---
# Allow all pods to reach CoreDNS for name resolution.
# Without this, every pod loses DNS as soon as namespace policies apply default-deny.
apiVersion: "cilium.io/v2"
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: allow-dns
spec:
  endpointSelector: {}
  egress:
    - toEndpoints:
        - matchLabels:
            k8s-app: kube-dns
            io.kubernetes.pod.namespace: kube-system
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
---
# Allow all pods to reach the Kubernetes API server.
# Controllers (ArgoCD, cert-manager, sealed-secrets, tailscale, external-dns) all need this.
apiVersion: "cilium.io/v2"
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: allow-kube-apiserver
spec:
  endpointSelector: {}
  egress:
    - toEntities:
        - kube-apiserver
---
# Exempt kube-system from all policy enforcement.
# Cilium agents, CoreDNS, cilium-envoy, metrics-server and local-path-provisioner
# must communicate freely — restricting the policy engine itself is unsafe.
apiVersion: "cilium.io/v2"
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: allow-kube-system
spec:
  endpointSelector:
    matchLabels:
      io.kubernetes.pod.namespace: kube-system
  ingress:
    - fromEntities:
        - all
  egress:
    - toEntities:
        - all
---
# Exempt cilium-spire from policy enforcement.
# SPIRE Server and Agents must communicate freely to issue SVIDs to all other workloads.
# Restricting SPIRE would prevent Cilium from obtaining identities, deadlocking mutual auth.
apiVersion: "cilium.io/v2"
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: allow-cilium-spire
spec:
  endpointSelector:
    matchLabels:
      io.kubernetes.pod.namespace: cilium-spire
  ingress:
    - fromEntities:
        - all
  egress:
    - toEntities:
        - all
