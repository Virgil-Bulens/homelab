---
# The networking namespace hosts the Gateway object and its wildcard TLS certificate.
# No pods run here — the Gateway is implemented by cilium-envoy in kube-system.
# Cilium rejects policies with empty ingress/egress arrays.
# This policy selects a label that no pod will ever have, so it is effectively a no-op.
apiVersion: "cilium.io/v2"
kind: CiliumNetworkPolicy
metadata:
  name: networking-placeholder
  namespace: networking
spec:
  endpointSelector:
    matchLabels:
      no-pods-in-this-namespace: "true"
  ingress:
    - fromEntities:
        - kube-apiserver
