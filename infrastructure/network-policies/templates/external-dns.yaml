---
# external-dns-external: watches HTTPRoutes/Services via API server (baseline),
# pushes DNS records to Cloudflare API over the internet.
apiVersion: "cilium.io/v2"
kind: CiliumNetworkPolicy
metadata:
  name: external-dns-external
  namespace: external-dns-external
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: external-dns
  egress:
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
---
# external-dns-internal: watches HTTPRoutes/Services via API server (baseline),
# pushes DNS records to the UniFi webhook sidecar (localhost) and the UniFi
# controller on the LAN (192.168.1.1).
apiVersion: "cilium.io/v2"
kind: CiliumNetworkPolicy
metadata:
  name: external-dns-internal
  namespace: external-dns-internal
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: external-dns
  ingress:
    # Allow the unifi-webhook sidecar to be reached by the main container (same pod = loopback,
    # but Cilium policies also govern inter-container traffic in some configurations).
    - fromEndpoints:
        - matchLabels:
            app.kubernetes.io/name: external-dns
      toPorts:
        - ports:
            - port: "8888"
              protocol: TCP
  egress:
    # UniFi controller on the LAN
    - toCIDR:
        - 192.168.1.1/32
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    # Sidecar webhook loopback
    - toEndpoints:
        - matchLabels:
            app.kubernetes.io/name: external-dns
      toPorts:
        - ports:
            - port: "8888"
              protocol: TCP
