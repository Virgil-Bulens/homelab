---
# sealed-secrets controller: accepts webhook calls from the API server on port 8080,
# and exposes metrics on 8081. No pod-to-pod egress needed beyond DNS + API server (baseline).
apiVersion: "cilium.io/v2"
kind: CiliumNetworkPolicy
metadata:
  name: sealed-secrets
  namespace: sealed-secrets
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: sealed-secrets
  ingress:
    - fromEntities:
        - kube-apiserver
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
            - port: "8081"
              protocol: TCP
  egress:
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
