---
apiVersion: tailscale.com/v1alpha1
kind: Connector
metadata:
  name: homelab-subnet-router
  namespace: tailscale
spec:
  hostname: homelab-subnet-router
  subnetRouter:
    advertiseRoutes:
      - "192.168.2.9/32"    # Proxmox
      - "192.168.2.10/32"   # k8s control plane (API server :6443)
      - "192.168.2.100/32"  # Cilium Gateway (cluster ingress)
      - "192.168.1.1/32"    # UniFi controller
  tags:
    - tag:k8s-operator
