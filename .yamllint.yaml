---
extends: default
# Helm templates with Go template directives ({{ }}) are not valid standalone YAML
ignore: |
  infrastructure/authentik/templates/blueprint-example.yaml
rules:
  line-length:
    max: 150
    # SealedSecret encrypted values exceed line limits — ignore them
    ignore: |
      infrastructure/**/*-secret.yaml
      infrastructure/**/*-sealed.yaml
      infrastructure/**/templates/*token*.yaml
      infrastructure/**/templates/*secret*.yaml
  truthy:
    allowed-values: ["true", "false"]
  document-start: enable
