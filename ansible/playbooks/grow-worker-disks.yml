---
# Extend the root filesystem on worker nodes after Terraform has resized the Proxmox VM disk.
# Safe to re-run — growpart and resize2fs are both idempotent.
# Run after any worker_disk_size increase in infrastructure/proxmox/variables.tf.
- name: Grow worker root filesystems
  hosts: workers
  become: true

  tasks:
    - name: Install cloud-guest-utils (provides growpart)
      ansible.builtin.apt:
        name: cloud-guest-utils
        state: present
        update_cache: false

    - name: Detect root device and partition number
      ansible.builtin.shell:
        # findmnt gives us e.g. /dev/sda1; we split off the trailing digit(s) for growpart
        cmd: |
          device=$(findmnt -n -o SOURCE /)
          echo "device=$device"
          # Strip trailing digit(s) to get the disk (e.g. /dev/sda)
          disk=$(echo "$device" | sed 's/[0-9]*$//')
          # Partition number is the trailing digit(s)
          part=$(echo "$device" | grep -oE '[0-9]+$')
          echo "disk=$disk part=$part"
      register: root_info
      changed_when: false

    - name: Parse disk and partition
      ansible.builtin.set_fact:
        root_disk: "{{ root_info.stdout | regex_search('disk=([^\\n]+)', '\\1') | first }}"
        root_part: "{{ root_info.stdout | regex_search('part=([^\\n]+)', '\\1') | first }}"

    - name: Extend partition to fill disk
      ansible.builtin.command:
        cmd: growpart {{ root_disk }} {{ root_part }}
      register: growpart_result
      # growpart exits 1 if already at max size — that is not a failure
      failed_when: growpart_result.rc not in [0, 1]
      changed_when: growpart_result.rc == 0

    - name: Resize filesystem to fill partition
      ansible.builtin.command:
        cmd: resize2fs {{ root_disk }}{{ root_part }}
      register: resize_result
      changed_when: "'nothing to do' not in resize_result.stdout"
