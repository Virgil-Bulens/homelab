---
# Extend the root filesystem on worker nodes after Terraform has resized the Proxmox VM disk.
# Safe to re-run — growpart and resize2fs are both idempotent.
# Run after any worker_disk_size increase in infrastructure/proxmox/variables.tf.
- name: Grow worker root filesystems
  hosts: workers
  become: true

  tasks:
    - name: Install cloud-guest-utils (provides growpart)
      ansible.builtin.apt:
        name: cloud-guest-utils
        state: present
        update_cache: false

    - name: Detect root disk
      ansible.builtin.shell:
        cmd: findmnt -n -o SOURCE / | sed 's/[0-9]*$//'
      register: root_disk_raw
      changed_when: false

    - name: Detect root partition number
      ansible.builtin.shell:
        cmd: findmnt -n -o SOURCE / | grep -oE '[0-9]+$'
      register: root_part_raw
      changed_when: false

    - name: Extend partition to fill disk
      ansible.builtin.command:
        cmd: growpart {{ root_disk_raw.stdout | trim }} {{ root_part_raw.stdout | trim }}
      register: growpart_result
      # growpart exits 1 if already at max size — that is not a failure
      failed_when: growpart_result.rc not in [0, 1]
      changed_when: growpart_result.rc == 0

    - name: Resize filesystem to fill partition
      ansible.builtin.command:
        cmd: resize2fs {{ root_disk_raw.stdout | trim }}{{ root_part_raw.stdout | trim }}
      register: resize_result
      changed_when: "'nothing to do' not in resize_result.stdout"
