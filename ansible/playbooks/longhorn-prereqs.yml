---
# Install Longhorn node prerequisites on all cluster nodes.
# Must be run before deploying the Longhorn Helm chart via ArgoCD.
# Longhorn requires open-iscsi (iscsid) for block storage; nfs-common for NFS volumes.
- name: Install Longhorn prerequisites
  hosts: all
  become: true
  tasks:
    - name: Install required packages
      ansible.builtin.apt:
        name:
          - open-iscsi
          - nfs-common
        state: present
        update_cache: true

    - name: Enable and start iscsid
      ansible.builtin.systemd:
        name: iscsid
        enabled: true
        state: started
